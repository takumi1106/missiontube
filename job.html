<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>職種入力</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/the-new-css-reset/css/reset.min.css">
    <link rel="stylesheet" href="./scss/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=DotGothic16&family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon">
</head>

<body>
    <header class="header">
        <h1 class="header__title">MissionTube</h1>
    </header>
    <main class="job">
        <div class="job__inner">
        <h2 class="job__sub-title subT">職種を入力してください</h1>

        <form id="job-form" class="job__form">
            <input type="text" id="job-name" class="job__input Input" placeholder="例）Webデザイナー">

            <div class="job__button-list">
                <button type="button" class="job__back-btn" id="job-back-btn">
                    戻る
                </button>

                <button type="submit" class="job__next-btn">
                    次へ
                </button>
            </div>
        </form>
        </div>
    </main>

    <script src="./script.js"></script>
</body>

</html>
