<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>制限時間設定</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/the-new-css-reset/css/reset.min.css">
    <link rel="stylesheet" href="./scss/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=DotGothic16&family=M+PLUS+Rounded+1c&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="header">
        <h1 class="header__title">MissionTube</h1>
    </header>
    <main class="timer">
        <div class="timer__inner">
            <h2 class="timer__sub-title subT">ミッションの制限時間を<br>設定してください</h2>

            <div class="timer__text">
                <p>この時間内にミッションを達成すると、<br>動画の再生時間が追加されます。</p>
                <p>制限時間を過ぎると動画の再生が<span>停止</span>します。</p>
            </div>

            <section class="timer-setting timer__setting">
                <label>制限時間</label>

                <input class="timer__min Input" type="number" id="mission-minute" min="0" value="10">
                <span>分</span>

                <input class="timer__sec Input" type="number" id="mission-second" min="0" max="59" value="0">
                <span>秒</span>
            </section>

            <div class="timer__button-list">
                <button type="button" class="back-btn timer__back-btn" id="timer-back-btn">
                    戻る
                </button>

                <button class="next-btn timer__next-btn" type="button" id="timer-decision-btn">
                    決定
                </button>
            </div>
        </div>
    </main>

    <script src="./script.js"></script>
</body>

</html>
