<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>獲得時間設定</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/the-new-css-reset/css/reset.min.css">
    <link rel="stylesheet" href="./scss/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=DotGothic16&family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon">
</head>

<body>
    <header class="header">
        <h1 class="header__title">MissionTube</h1>
    </header>
    <main class="reward">
        <div class="reward__inner">
            <h2 class="reward__sub-title subT">ミッション達成時の獲得動画時間を<br>設定してください</h2>

            <section class="reward-setting">
                <div class="reward-setting reward__setting">
                    <label>獲得時間</label>
                    <input class="reward__min Input" type="number" id="reward-minute" min="0" value="10">
                    <span>分</span>

                    <input class="reward__sec Input" type="number" id="reward-second" min="0" max="59" value="30">
                    <span>秒</span>
                </div>
            </section>

            <div class="reward__button-list">
                <button type="button" class="back-btn reward__back-btn" id="reward-back-btn">
                    戻る
                </button>

                <button class="next-btn reward__next-btn" type="button" id="reward-decision-btn">
                    決定
                </button>
            </div>
        </div>
    </main>

    <script src="./script.js"></script>
</body>

</html>
