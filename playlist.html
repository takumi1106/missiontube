<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>再生リスト作成</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/the-new-css-reset/css/reset.min.css">
    <link rel="stylesheet" href="./scss/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=DotGothic16&family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon">
</head>

<body>
    <header class="header">
        <h1 class="header__title">MissionTube</h1>
    </header>
    <main class="playlist">
        <div class="playlist__inner">
            <h2 class="playlist__sub-title subT">再生リストを作成してください</h2>
            <div class="playlist__text">
                <p>作業中に流したい動画を選択してください。<br><span>※複数選択可</span></p>
            </div>

            <section class="playlist-search">
                <h3 class="playlist__label" for="video-search">動画検索</h3>
                <div class="playlist-setting playlist__setting">
                    <input class="playlist__input Input" type="text" id="video-search" placeholder="例：作業用BGM">
                    <button class="playlist__search" type="button" id="search-video-btn">検索</button>
                </div>
            </section>

            <h3 id="video-list-title" class="playlist__label is-hidden">履歴</h3>
            <section class="recommended-videos" id="recommended-videos">
                <div class="recommended-video-list" id="recommended-video-list"></div>
            </section>

            <section class="video-list" id="video-list"></section>

            <section class="selected-videos">
                <h3 class="playlist__label">選択した動画</h3>

                <ul class="playlist__selected-list" id="selected-video-list"></ul>

                <button type="button" class="playlist__delete-btn is-hidden" id="selected-delete-btn">
                    削除
                </button>
            </section>

            <div class="playlist__button-list">
                <button type="button" class="back-btn playlist__back-btn" id="playlist-back-btn">
                    戻る
                </button>

                <button class="next-btn playlist__next-btn" type="button" id="playlist-decision-btn">
                    完了
                </button>
            </div>
        </div>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="./script.js"></script>
</body>

</html>
